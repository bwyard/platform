name: breeyard

services:
  postgres:
    image: postgres:17-alpine
    container_name: breeyard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-breeyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-breeyard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-breeyard}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: breeyard-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: breeyard-api
    container_name: breeyard-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      NODE_ENV: production
      PORT: 3400
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
        PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL}
    image: breeyard-web
    container_name: breeyard-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3411:3411"
    environment:
      NODE_ENV: production
      PORT: 3411
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3400
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - internal

  cms:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    image: breeyard-cms
    container_name: breeyard-cms
    restart: unless-stopped
    ports:
      - "127.0.0.1:3412:3412"
    environment:
      NODE_ENV: production
      PORT: 3412
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3400
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - internal

  crm:
    build:
      context: ../..
      dockerfile: apps/crm/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    image: breeyard-crm
    container_name: breeyard-crm
    restart: unless-stopped
    ports:
      - "127.0.0.1:3413:3413"
    environment:
      NODE_ENV: production
      PORT: 3413
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3400
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - internal

  portal:
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    image: breeyard-portal
    container_name: breeyard-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:3414:3414"
    environment:
      NODE_ENV: production
      PORT: 3414
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3400
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - internal

  portfolio:
    build:
      context: ../..
      dockerfile: apps/portfolio/Dockerfile
    image: breeyard-portfolio
    container_name: breeyard-portfolio
    restart: unless-stopped
    ports:
      - "127.0.0.1:3415:3415"
    environment:
      NODE_ENV: production
      PORT: 3415
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3400
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
