services:
  postgres:
    image: postgres:18-alpine
    container_name: ${PROJECT_NAME:-breeyard}-postgres
    restart: "no"
    profiles: ["breeyard"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-breeyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-breeyard}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-breeyard}']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME:-breeyard}-mailpit
    restart: "no"
    profiles: ["breeyard"]
    ports:
      - '${MAILPIT_SMTP_PORT:-1026}:1025'
      - '${MAILPIT_UI_PORT:-8026}:8025'

volumes:
  postgres_data:
