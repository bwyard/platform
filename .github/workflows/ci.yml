name: CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required for type resolution)
        run: pnpm --filter './packages/**' run build

      - name: Typecheck
        env:
          PUBLIC_API_URL: https://api.8ofwands.com
          PUBLIC_PORTAL_URL: https://portal.8ofwands.com
        run: pnpm -r --if-present run typecheck

      - name: Lint
        env:
          PUBLIC_API_URL: https://api.8ofwands.com
          PUBLIC_PORTAL_URL: https://portal.8ofwands.com
        run: pnpm -r --if-present run lint
