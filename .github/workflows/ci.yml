name: CI

on:
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high --prod

      - name: Format check
        run: pnpm format:check

  check:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fast]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required for type resolution)
        run: pnpm --filter './packages/**' run build

      - name: Typecheck
        env:
          PUBLIC_PORTAL_URL: https://portal.8ofwands.com
        run: pnpm -r --if-present run typecheck

      - name: Lint
        env:
          PUBLIC_PORTAL_URL: https://portal.8ofwands.com
        run: pnpm -r --if-present run lint

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fast]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: breeyard
          POSTGRES_PASSWORD: breeyard
          POSTGRES_DB: breeyard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://breeyard:breeyard@localhost:5432/breeyard
      BETTER_AUTH_SECRET: ci-test-secret-minimum-32-chars-placeholder
      TRUSTED_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      CORS_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter './packages/**' run build

      - name: Run migrations
        run: pnpm --filter @breeyard/database db:migrate

      - name: Run tests
        run: pnpm vitest run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    # E2E only on PRs to main — too slow for every dev branch
    if: github.base_ref == 'main'

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: breeyard
          POSTGRES_PASSWORD: breeyard
          POSTGRES_DB: breeyard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://breeyard:breeyard@localhost:5432/breeyard
      BETTER_AUTH_SECRET: e2e-test-secret-minimum-32-chars-placeholder
      # BETTER_AUTH_URL is set per-app via webServer[n].env in playwright.config.ts
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      PUBLIC_PORTAL_URL: http://localhost:3014
      CORS_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      TRUSTED_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      E2E_ADMIN_1_EMAIL: bree@8ofwands.com
      E2E_ADMIN_1_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
      E2E_CLIENT_1_EMAIL: client@example.com
      E2E_CLIENT_1_PASSWORD: ${{ secrets.SEED_CLIENT_PASSWORD }}
      SEED_ADMIN_EMAIL: bree@8ofwands.com
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
      SEED_CLIENT_EMAIL: client@example.com
      SEED_CLIENT_PASSWORD: ${{ secrets.SEED_CLIENT_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter './packages/**' run build

      - name: Write .env for dev scripts
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://breeyard:breeyard@localhost:5432/breeyard
          BETTER_AUTH_SECRET=e2e-test-secret-minimum-32-chars-placeholder
          BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
          PUBLIC_PORTAL_URL=http://localhost:3014
          CORS_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
          TRUSTED_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
          SEED_ADMIN_EMAIL=bree@8ofwands.com
          SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
          SEED_CLIENT_EMAIL=client@example.com
          SEED_CLIENT_PASSWORD=${SEED_CLIENT_PASSWORD}
          EOF

      - name: Run migrations
        run: pnpm --filter @breeyard/database db:migrate

      - name: Seed test data
        run: node packages/core/database/dist/seed.js

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
