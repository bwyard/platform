name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: breeyard
          POSTGRES_PASSWORD: breeyard
          POSTGRES_DB: breeyard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://breeyard:breeyard@localhost:5432/breeyard
      BETTER_AUTH_SECRET: e2e-test-secret-minimum-32-chars-placeholder
      BETTER_AUTH_URL: http://localhost:3010
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      PUBLIC_API_URL: http://localhost:3010
      PUBLIC_PORTAL_URL: http://localhost:3014
      INTERNAL_API_URL: http://localhost:3010
      REDIS_URL: redis://localhost:6379
      CORS_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      TRUSTED_ORIGINS: http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
      E2E_ADMIN_EMAIL: bree@8ofwands.com
      E2E_ADMIN_PASSWORD: orbittigerstone530
      SEED_ADMIN_EMAIL: bree@8ofwands.com
      SEED_ADMIN_PASSWORD: orbittigerstone530
      SEED_CLIENT_EMAIL: client@example.com
      SEED_CLIENT_PASSWORD: blazecedarstone952

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter './packages/**' run build

      - name: Write .env for dev scripts
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://breeyard:breeyard@localhost:5432/breeyard
          BETTER_AUTH_SECRET=e2e-test-secret-minimum-32-chars-placeholder
          BETTER_AUTH_URL=http://localhost:3010
          BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
          PUBLIC_API_URL=http://localhost:3010
          PUBLIC_PORTAL_URL=http://localhost:3014
          INTERNAL_API_URL=http://localhost:3010
          REDIS_URL=redis://localhost:6379
          CORS_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
          TRUSTED_ORIGINS=http://localhost:3011,http://localhost:3012,http://localhost:3013,http://localhost:3014,http://localhost:3015
          SEED_ADMIN_EMAIL=bree@8ofwands.com
          SEED_ADMIN_PASSWORD=orbittigerstone530
          SEED_CLIENT_EMAIL=client@example.com
          SEED_CLIENT_PASSWORD=blazecedarstone952
          EOF

      - name: Run migrations
        run: pnpm --filter @breeyard/database db:migrate

      - name: Seed test data
        run: node packages/core/database/dist/seed.js

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-deploy health check
        run: |
          curl --fail --silent --max-time 10 http://${{ secrets.DEPLOY_HOST }}:3400/health \
            || echo "::warning::Pre-deploy health check failed — API may already be down"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/home/bree/app/breeyard"
            COMPOSE_FILE="$APP_DIR/infra/docker/docker-compose.prod.yml"
            ENV_FILE="/home/bree/stacks/breeyard/.env.prod"
            COMPOSE="sudo docker compose -f $COMPOSE_FILE --env-file $ENV_FILE"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github-bwyard:bwyard/platform.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            PREVIOUS_COMMIT=$(git rev-parse HEAD~1 2>/dev/null || echo "")

            # Build all images
            $COMPOSE build --no-cache api web cms crm portal portfolio

            # Start infra first
            $COMPOSE up -d --no-build postgres redis
            sleep 5

            # Run migrations
            NETWORK="breeyard_internal"
            POSTGRES_PASSWORD=$(grep -E '^POSTGRES_PASSWORD=' "$ENV_FILE" | cut -d= -f2-)
            sudo docker run --rm \
              --network "$NETWORK" \
              --env-file "$ENV_FILE" \
              -e DATABASE_URL="postgresql://breeyard:${POSTGRES_PASSWORD}@breeyard-postgres:5432/breeyard" \
              -e CI=true \
              -v "$APP_DIR:/workspace" \
              -w /workspace \
              node:22-alpine \
              sh -c "corepack enable \
                && corepack prepare pnpm@10.32.1 --activate \
                && pnpm install --frozen-lockfile \
                && pnpm --filter @breeyard/database db:migrate" \
              || echo "::warning::Migration failed — check DB manually"

            # Seed — idempotent, safe on every deploy, updates credentials if env vars changed
            SEED_ADMIN_EMAIL=$(grep -E '^SEED_ADMIN_EMAIL=' "$ENV_FILE" | cut -d= -f2- || true)
            SEED_ADMIN_NAME=$(grep -E '^SEED_ADMIN_NAME=' "$ENV_FILE" | cut -d= -f2- || true)
            SEED_ADMIN_PASSWORD=$(grep -E '^SEED_ADMIN_PASSWORD=' "$ENV_FILE" | cut -d= -f2- || true)
            SEED_CLIENT_EMAIL=$(grep -E '^SEED_CLIENT_EMAIL=' "$ENV_FILE" | cut -d= -f2- || true)
            SEED_CLIENT_PASSWORD=$(grep -E '^SEED_CLIENT_PASSWORD=' "$ENV_FILE" | cut -d= -f2- || true)
            if [ -n "$SEED_ADMIN_PASSWORD" ]; then
              sudo docker run --rm \
                --network "$NETWORK" \
                --env-file "$ENV_FILE" \
                -e DATABASE_URL="postgresql://breeyard:${POSTGRES_PASSWORD}@breeyard-postgres:5432/breeyard" \
                -e SEED_ADMIN_EMAIL="$SEED_ADMIN_EMAIL" \
                -e SEED_ADMIN_NAME="$SEED_ADMIN_NAME" \
                -e SEED_ADMIN_PASSWORD="$SEED_ADMIN_PASSWORD" \
                -e SEED_CLIENT_EMAIL="$SEED_CLIENT_EMAIL" \
                -e SEED_CLIENT_PASSWORD="$SEED_CLIENT_PASSWORD" \
                breeyard-api \
                node /app/node_modules/@breeyard/database/dist/seed.js \
                || echo "::warning::Seed failed — check DB manually"
            else
              echo "::warning::SEED_ADMIN_PASSWORD not set — skipping seed"
            fi

            # Rolling restart: api first, then frontends
            for service in api web cms crm portal portfolio; do
              $COMPOSE up -d --no-build $service
              sleep 3
            done

            # Health check
            sleep 10
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 15 http://localhost:3400/health || echo "000")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "ERROR: Health check failed (HTTP $HTTP_STATUS). Rolling back..."
              if [ -n "$PREVIOUS_COMMIT" ]; then
                git checkout "$PREVIOUS_COMMIT"
                $COMPOSE build --no-cache api web cms crm portal portfolio
                $COMPOSE up -d --no-build api web cms crm portal portfolio
                echo "Rollback complete to $PREVIOUS_COMMIT"
              fi
              exit 1
            fi

            echo "Deploy successful. HTTP $HTTP_STATUS."

            # Prune build cache and dangling images after every deploy to prevent disk fill
            sudo docker builder prune --all -f || true
            sudo docker image prune -f || true

      - name: External health check
        run: |
          sleep 5
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 15 http://${{ secrets.DEPLOY_HOST }}:3400/health || echo "000")
          if [ "$HTTP_STATUS" == "000" ]; then
            echo "::error::External health check failed — API unreachable"
            exit 1
          fi
          echo "External health check passed (HTTP $HTTP_STATUS)"

      - name: Notify success
        if: success()
        run: echo "::notice::Deploy succeeded — ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "::error::Deploy failed — ${{ github.sha }}"
