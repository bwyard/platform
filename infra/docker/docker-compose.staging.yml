name: breeyard-staging

# Staging environment — on-demand only.
# restart: "no" — server reboots do not resurrect staging.
# Ports: prod +1000 (4400-4415).
# Spin up:  docker compose -p breeyard-staging -f infra/docker/docker-compose.staging.yml --env-file ~/stacks/breeyard/.env.staging up -d --build
# Tear down: docker compose -p breeyard-staging -f infra/docker/docker-compose.staging.yml down -v --remove-orphans

services:
  postgres:
    image: postgres:18-alpine
    container_name: breeyard-staging-postgres
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-breeyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-breeyard}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - staging_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-breeyard}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: breeyard-staging-redis
    restart: "no"
    command: redis-server --requirepass ${REDIS_PASSWORD:?required}
    volumes:
      - redis_staging_data:/data
    networks:
      - staging_internal
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: breeyard-staging-api
    container_name: breeyard-staging-api
    restart: "no"
    ports:
      - "127.0.0.1:4400:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - staging_internal

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
        PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL}
    image: breeyard-staging-web
    container_name: breeyard-staging-web
    restart: "no"
    ports:
      - "127.0.0.1:4411:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - staging_internal

  cms:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    image: breeyard-staging-cms
    container_name: breeyard-staging-cms
    restart: "no"
    ports:
      - "127.0.0.1:4412:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - staging_internal

  crm:
    build:
      context: ../..
      dockerfile: apps/crm/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    image: breeyard-staging-crm
    container_name: breeyard-staging-crm
    restart: "no"
    ports:
      - "127.0.0.1:4413:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - staging_internal

  portal:
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    image: breeyard-staging-portal
    container_name: breeyard-staging-portal
    restart: "no"
    ports:
      - "127.0.0.1:4414:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - staging_internal

  portfolio:
    build:
      context: ../..
      dockerfile: apps/portfolio/Dockerfile
    image: breeyard-staging-portfolio
    container_name: breeyard-staging-portfolio
    restart: "no"
    ports:
      - "127.0.0.1:4415:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      INTERNAL_API_URL: http://api:3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:?required}
    depends_on:
      - api
    networks:
      - staging_internal

networks:
  staging_internal:
    driver: bridge

volumes:
  postgres_staging_data:
  redis_staging_data:
