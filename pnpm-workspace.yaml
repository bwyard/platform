packages:
  - 'apps/*'
  - 'packages/core/*'
  - 'packages/infra/*'
  - 'packages/cms/*'
  - 'packages/client-portal/*'
  - 'packages/ops/*'
  - 'packages/extended/*'

overrides:
  vite: '8.0.14'
  zod: '4.4.3'
  fast-uri: '>=3.1.2'
  fast-xml-parser: '>=5.7.0'
  fast-xml-builder: '>=1.1.7'
  postcss: '>=8.5.10'
  ws: '>=8.20.1'
  brace-expansion: '>=5.0.6'
  cookie: '>=0.7.0'
  yaml: '>=2.8.3'
  tmp: '>=0.2.6'
  '@babel/plugin-transform-modules-systemjs': '>=7.29.4'
  esbuild: '>=0.24.3'
  uuid: '>=11.1.1'

allowBuilds:
  esbuild: true
  msgpackr-extract: true
  nx: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@eslint/plugin-kit@0.7.2'
  - eslint@10.4.1
