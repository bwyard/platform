name: breeyard

services:
  postgres:
    image: postgres:18-alpine
    container_name: breeyard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-breeyard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-breeyard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-breeyard}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL}
    image: breeyard-web
    container_name: breeyard-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3411:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  cms:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
    image: breeyard-cms
    container_name: breeyard-cms
    restart: unless-stopped
    ports:
      - "127.0.0.1:3412:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_REGION: ${STORAGE_REGION}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  crm:
    build:
      context: ../..
      dockerfile: apps/crm/Dockerfile
    image: breeyard-crm
    container_name: breeyard-crm
    restart: unless-stopped
    ports:
      - "127.0.0.1:3413:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      PORTAL_URL: ${PUBLIC_PORTAL_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  portal:
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
    image: breeyard-portal
    container_name: breeyard-portal
    restart: unless-stopped
    ports:
      - "127.0.0.1:3414:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-breeyard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breeyard}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  portfolio:
    build:
      context: ../..
      dockerfile: apps/portfolio/Dockerfile
    image: breeyard-portfolio
    container_name: breeyard-portfolio
    restart: unless-stopped
    ports:
      - "127.0.0.1:3415:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
