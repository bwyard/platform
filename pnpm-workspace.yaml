packages:
  - 'apps/*'
  - 'packages/core/*'
  - 'packages/infra/*'
  - 'packages/cms/*'
  - 'packages/client-portal/*'
  - 'packages/ops/*'
  - 'packages/extended/*'

overrides:
  vite: '8.0.14'

allowBuilds:
  esbuild: true
  msgpackr-extract: true
  nx: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@eslint/plugin-kit@0.7.2'
  - eslint@10.4.1
